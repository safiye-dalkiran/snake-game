<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div class="score-board">
            <div>SKOR: <span id="current-score">000</span></div>
            <div>EN YÜKSEK: <span id="high-score">000</span></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="canvas" width="600" height="600"></canvas>
            <div id="ui-overlay" class="overlay">
                <div id="start-screen" class="screen">
                    <h1>SNAKE PRO</h1>

                    <div class="color-picker-wrapper">
                        <p>Yılanın Rengini Seç:</p>
                        <div class="color-options">
                            <div class="color-dot active" data-color="#388e3c" style="background-color: #4caf50;"></div>
                            <div class="color-dot" data-color="#7b1fa2" style="background-color: #9c27b0;"></div>
                            <div class="color-dot" data-color="#0288d1" style="background-color: #03a9f4;"></div>
                            <div class="color-dot" data-color="#e64a19" style="background-color: #ff5722;"></div>
                            <div class="color-dot" data-color="#c2185b" style="background-color: #e91e63;"></div>
                        </div>
                    </div>

                    <button id="btn-start-game" class="menu-btn">OYNA</button>
                </div>

                <div id="game-over-screen" class="screen hidden">
                    <h1 class="game-over-title">OYUN BİTTİ</h1>
                    <p style="margin-bottom: 20px;">Skorunuz: <span id="final-score">0</span></p>
                    <div class="menu-btn-group">
                        <button id="btn-restart-game" class="menu-btn restart">TEKRAR OYNA</button>
                        <button id="btn-home" class="menu-btn home">ANA MENÜ</button>
                    </div>
                </div>
            </div>

            <div id="mobile-controls" class="mobile-controls">
                <button id="btn-up" class="control-btn up">▲</button>
                <div class="middle-row">
                    <button id="btn-left" class="control-btn left">◀</button>
                    <div class="spacer"></div>
                    <button id="btn-right" class="control-btn right">▶</button>
                </div>
                <button id="btn-down" class="control-btn down">▼</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
